  <script>
  (function() {
    // Only run this specific logic if on the Clinic Profit Intelligence page
    if (window.location.pathname !== '/clinic-profit-intelligence' && window.location.pathname !== '/clinic-profit-intelligence/') return;

    // ── UTILITY ──────────────────────────────────────────────────────────
    var _fired   = {};           // deduplication registry
    var _timers  = {};           // per-tool engagement timers
    var _depths  = {};           // max scroll depth per tool
    var _started = Date.now();   // page load timestamp
  
    function fire(eventName, params, dedupKey) {
      if (dedupKey && _fired[dedupKey]) return;
      if (dedupKey) _fired[dedupKey] = true;
      fbq('trackCustom', eventName, params || {});
    }
  
    function timeOnPage() {
      return Math.round((Date.now() - _started) / 1000);
    }
  
    // ── ① PAGE QUALITY SIGNAL ────────────────────────────────────────────
    // Fires once after 15s of active presence — separates real visitors
    // from bounces. This is your highest-quality retargeting seed audience.
    setTimeout(function() {
      fire('CPI_EngagedVisit', {
        content_name : 'clinic_profit_intelligence',
        time_on_page : 15
      }, 'engaged_visit');
    }, 15000);
  
  
    // ── ② TOOL CARD CLICK (which tool interests them most) ───────────────
    // Fires when visitor clicks "Use This Tool" in the top menu grid.
    // Tells you which tools attract the most attention — use for ad copy.
    document.addEventListener('click', function(e) {
      var card = e.target.closest('[data-tool-card]');
      if (!card) return;
      var toolName = card.getAttribute('data-tool-card');
      fire('CPI_ToolSelected', {
        tool_name    : toolName,
        content_name : 'clinic_profit_intelligence',
        time_on_page : timeOnPage()
      });
    });
  
  
    // ── ③ TOOL INTERACTION START ─────────────────────────────────────────
    // Fires when a visitor first touches a slider or input inside a tool.
    // "They read it" vs "they actually used it" — critical distinction.
    var toolStarted = {};
    document.addEventListener('input', function(e) {
      var section = e.target.closest('[data-tool-section]');
      if (!section) return;
      var toolName = section.getAttribute('data-tool-section');
      if (toolStarted[toolName]) return;
      toolStarted[toolName] = true;
      _timers[toolName] = Date.now();
      fire('CPI_ToolInteractionStart', {
        tool_name    : toolName,
        content_name : 'clinic_profit_intelligence',
        time_on_page : timeOnPage()
      });
    });
  
  
    // ── ④ TOOL RESULT SEEN ───────────────────────────────────────────────
    // Fires when the result block inside a tool becomes visible.
    // This is the Aha! moment — someone who reached a result is
    // 4-6x more likely to convert. Retarget these people hard.
    function observeResults() {
      var resultBlocks = document.querySelectorAll('[data-tool-result]');
      if (!resultBlocks.length) return;
  
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          var toolName = entry.target.getAttribute('data-tool-result');
          var engageSecs = _timers[toolName]
            ? Math.round((Date.now() - _timers[toolName]) / 1000) : 0;
          fire('CPI_ToolResultSeen', {
            tool_name        : toolName,
            content_name     : 'clinic_profit_intelligence',
            engagement_secs  : engageSecs,
            time_on_page     : timeOnPage()
          }, 'result_seen_' + toolName);
        });
      }, { threshold: 0.5 });
  
      resultBlocks.forEach(function(block) { observer.observe(block); });
    }
    // Run after DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', observeResults);
    } else { observeResults(); }
  
  
    // ── ⑤ SHARE BUTTON CLICK ────────────────────────────────────────────
    // Fires when visitor clicks "Share My Result" on any tool.
    // High intent signal — someone sharing is almost certainly a dentist
    // (not a researcher) and is likely to convert or refer.
    document.addEventListener('click', function(e) {
      var shareBtn = e.target.closest('[data-share-tool]');
      if (!shareBtn) return;
      var toolName = shareBtn.getAttribute('data-share-tool');
      fire('CPI_ResultShared', {
        tool_name    : toolName,
        content_name : 'clinic_profit_intelligence',
        time_on_page : timeOnPage()
      });
    });
  
  
    // ── ⑥ CTA CLICK — TRIAL (highest intent on entire page) ─────────────
    // Fires on every "Start Free 14-Day Trial" button click site-wide.
    // Map to Meta's standard Lead event for bid optimisation.
    // Also fires a custom event with context so you know which tool drove it.
    document.addEventListener('click', function(e) {
      var trialBtn = e.target.closest('[data-cta="trial"]');
      if (!trialBtn) return;
      var toolName = trialBtn.getAttribute('data-cta-tool') || 'unknown';
      // Standard Lead event — Meta uses this for conversion optimisation
      fbq('track', 'Lead', {
        content_name     : 'clinic_profit_intelligence_trial',
        content_category : 'dental_saas',
        currency         : 'INR'
      });
      // Custom event with tool context
      fire('CPI_TrialCTAClick', {
        tool_name        : toolName,
        content_name     : 'clinic_profit_intelligence',
        time_on_page     : timeOnPage()
      });
    });
  
  
    // ── ⑦ CTA CLICK — DEMO (second highest intent) ───────────────────────
    // Fires on "Book a Demo" clicks. Separate from trial — these visitors
    // are warmer on the product but want a hand-held onboarding.
    // Distinct retargeting audience from trial clickers.
    document.addEventListener('click', function(e) {
      var demoBtn = e.target.closest('[data-cta="demo"]');
      if (!demoBtn) return;
      var toolName = demoBtn.getAttribute('data-cta-tool') || 'unknown';
      fbq('track', 'Contact', {
        content_name     : 'clinic_profit_intelligence_demo',
        content_category : 'dental_saas'
      });
      fire('CPI_DemoCTAClick', {
        tool_name    : toolName,
        content_name : 'clinic_profit_intelligence',
        time_on_page : timeOnPage()
      });
    });
  
  
    // ── ⑧ CLOSING SECTION SEEN ("You have now seen the full picture") ─────
    // Fires when the bottom dark CTA section scrolls into view.
    // This visitor has seen all 4 tools — your hottest retargeting audience.
    // If they still haven't converted, hit them with a very direct ad.
    function observeClosingSection() {
      var closing = document.querySelector('[data-section="closing-cta"]');
      if (!closing) return;
      var obs = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) {
          fire('CPI_FullJourneySeen', {
            content_name : 'clinic_profit_intelligence',
            time_on_page : timeOnPage()
          }, 'full_journey_seen');
          obs.disconnect();
        }
      }, { threshold: 0.4 });
      obs.observe(closing);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', observeClosingSection);
    } else { observeClosingSection(); }
  
  
    // ── ⑨ FAQ ACCORDION OPEN ────────────────────────────────────────────
    // Fires when a visitor opens a FAQ item. Signals consideration —
    // they have questions, not just curiosity. Good audience for
    // a "Got questions? Talk to us" retargeting ad.
    document.addEventListener('click', function(e) {
      var faqItem = e.target.closest('[data-faq-item]');
      if (!faqItem) return;
      var question = faqItem.getAttribute('data-faq-item');
      fire('CPI_FAQOpened', {
        question     : question,
        content_name : 'clinic_profit_intelligence',
        time_on_page : timeOnPage()
      });
    });
  
  
    // ── ⑩ EXIT INTENT ─────────────────────────────────────────────────
    // Fires when cursor moves rapidly toward the top of the browser
    // (desktop only) — classic exit signal. Build a retargeting audience
    // of "showed intent but left" — very efficient for recovery ads.
    var exitFired = false;
    document.addEventListener('mouseleave', function(e) {
      if (exitFired || e.clientY > 50) return;
      exitFired = true;
      fire('CPI_ExitIntent', {
        content_name : 'clinic_profit_intelligence',
        time_on_page : timeOnPage()
      }, 'exit_intent');
    });
  
  
    // ── ⑪ SCROLL DEPTH MILESTONES ────────────────────────────────────────
    // Fires at 25 / 50 / 75 / 100% page scroll.
    // Tells you how far visitors get before dropping off —
    // use to identify which tool section has the highest drop-off rate.
    var scrollMilestones = { 25:false, 50:false, 75:false, 100:false };
    window.addEventListener('scroll', function() {
      var scrolled = Math.round(
        (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100
      );
      [25, 50, 75, 100].forEach(function(m) {
        if (!scrollMilestones[m] && scrolled >= m) {
          scrollMilestones[m] = true;
          fire('CPI_ScrollDepth', {
            depth        : m,
            content_name : 'clinic_profit_intelligence',
            time_on_page : timeOnPage()
          }, 'scroll_' + m);
        }
      });
    }, { passive: true });
  
  
    // ── ⑫ ROI CALCULATOR HANDOFF CLICK ──────────────────────────────────
    // Fires when a visitor arrives from the homepage ROI calculator link.
    // Detects UTM or referrer to tag this as a warm handoff visitor —
    // they have already seen one tool and came here for more.
    // These visitors convert at 2-3x the rate of cold traffic.
    (function() {
      var ref  = document.referrer || '';
      var href = window.location.href || '';
      var fromROI = ref.includes('cue360.in') || href.includes('utm_source=roi_calculator');
      if (fromROI) {
        fire('CPI_FromROICalculator', {
          content_name : 'clinic_profit_intelligence',
          referrer     : ref
        }, 'from_roi_calc');
      }
    })();
  
  })(); // end IIFE
  </script>

<!-- SCRIPT 4: ViewedPricing -->
<script>
(function() {
  var pricingFired = false;
  
  function checkPricingSection() {
    var pricingSection = document.getElementById('pricing') || document.querySelector('[id*="pricing"]');
    if (!pricingSection) {
      setTimeout(checkPricingSection, 1000);
      return;
    }
    
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting && !pricingFired) {
          pricingFired = true;
          fbq('trackCustom', 'ViewedPricing', {
            content_name: 'pricing_page'
          });
          observer.disconnect();
        }
      });
    }, { threshold: 0.3 });
    observer.observe(pricingSection);
  }
  
  checkPricingSection();
})();
</script>

<!-- SCRIPT 5: ROICalculatorEngaged -->
<script>
(function() {
  var roiFired = { scroll: false, interact: false };

  function fireROIEvent(trigger, extra) {
    var payload = {
      content_name: 'roi_calculator',
      trigger: trigger
    };
    if (extra) Object.assign(payload, extra);
    fbq('trackCustom', 'ROICalculatorEngaged', payload);
    console.log('[Cue360] ROICalculatorEngaged fired:', trigger);
  }

  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    var href = link.getAttribute('href') || '';
    var text = link.textContent.trim().toLowerCase();
    if (
      href.includes('calculator') ||
      href.includes('roi') ||
      text.includes('calculator') ||
      text.includes('roi')
    ) {
      fireROIEvent('navbar_click', { link_text: link.textContent.trim() });
    }
  });

  function findCalcSection() {
    var selectors = [
      '#calculator', '#roi', '#roi-calculator',
      '[id*="calculator"]', '[id*="roi"]',
      '[class*="calculator"]', '[class*="roi"]'
    ];
    for (var i = 0; i < selectors.length; i++) {
      var el = document.querySelector(selectors[i]);
      if (el) return el;
    }
    var all = document.querySelectorAll('section, div');
    for (var j = 0; j < all.length; j++) {
      if (all[j].textContent.includes('no-shows are costing')) return all[j];
    }
    return null;
  }

  function setupScrollObserver() {
    var section = findCalcSection();
    if (!section) return;
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting && !roiFired.scroll) {
          roiFired.scroll = true;
          fireROIEvent('scrolled_into_view');
          observer.disconnect();
        }
      });
    }, { threshold: 0.3 });
    observer.observe(section);
  }

  function setupInteractionListener() {
    var section = findCalcSection();
    if (!section) return;
    section.addEventListener('input', function(e) {
      if (roiFired.interact) return;
      roiFired.interact = true;
      fireROIEvent('calculator_interacted', {
        element: e.target.tagName.toLowerCase(),
        input_name: e.target.name || e.target.id || 'unknown'
      });
    });
    section.addEventListener('click', function(e) {
      var btn = e.target.closest('button, a');
      if (!btn) return;
      fireROIEvent('calculator_button_clicked', {
        button_text: btn.textContent.trim()
      });
    });
  }

  function initROICalculator() {
    var section = findCalcSection();
    if (!section) {
      setTimeout(initROICalculator, 2000);
      return;
    }
    setupScrollObserver();
    setupInteractionListener();
  }

  initROICalculator();
})();
</script>

<!-- SCRIPT 6: Lead Form Events -->
<script>
(function() {
  var PIXEL_ID = '787549303968445';

  function findLeadForm() {
    var selectors = ['form', '[class*="form"]', '[id*="form"]'];
    for (var i = 0; i < selectors.length; i++) {
      var els = document.querySelectorAll(selectors[i]);
      for (var j = 0; j < els.length; j++) {
        if (
          els[j].textContent.toLowerCase().includes('request access') ||
          els[j].textContent.toLowerCase().includes('upgrade your practice')
        ) {
          return els[j];
        }
      }
    }
    return null;
  }

  var formFired = { started: false, submitted: false };
  var filledFields = {};

  function fireFormEvent(eventName, extra) {
    var payload = { content_name: 'lead_form' };
    if (extra) Object.assign(payload, extra);
    fbq('trackCustom', eventName, payload);
    console.log('[Cue360]', eventName, payload);
  }

  function getFieldLabel(el) {
    return el.placeholder || el.name || el.id || el.type || 'unknown';
  }

  function setupFormTracking() {
    var form = findLeadForm();
    if (!form) {
      setTimeout(setupFormTracking, 2000);
      return;
    }
    console.log('[Cue360] Lead form found — tracking active.');

    form.addEventListener('input', function(e) {
      var label = getFieldLabel(e.target);
      filledFields[label] = e.target.value;
      if (!formFired.started) {
        formFired.started = true;
        fireFormEvent('LeadFormStarted', { first_field: label });
      }
    });

    var submitBtns = Array.from(
      form.querySelectorAll('button[type="submit"], button, input[type="submit"], [class*="submit"], [class*="request"]')
    );
    document.querySelectorAll('button, a').forEach(function(btn) {
      if (btn.textContent.trim().toLowerCase().includes('request access')) {
        submitBtns.push(btn);
      }
    });

    submitBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        if (formFired.submitted) return;
        formFired.submitted = true;
        var inputs = form.querySelectorAll('input, textarea, select');
        var filled = 0;
        inputs.forEach(function(inp) {
          if (inp.value && inp.value.trim().length > 0) filled++;
        });
        fireFormEvent('LeadFormSubmitted', {
          fields_filled: filled,
          total_fields: inputs.length
        });
        fbq('track', 'Lead');
        console.log('[Cue360] Standard Lead event fired');
      });
    });

    window.addEventListener('beforeunload', function() {
      if (formFired.started && !formFired.submitted) {
        var inputs = form.querySelectorAll('input, textarea, select');
        var filled = 0;
        inputs.forEach(function(inp) {
          if (inp.value && inp.value.trim().length > 0) filled++;
        });
        if (navigator.sendBeacon) {
          navigator.sendBeacon(
            'https://www.facebook.com/tr?' +
            'id=' + PIXEL_ID +
            '&ev=LeadFormAbandoned' +
            '&cd[content_name]=lead_form' +
            '&cd[fields_filled]=' + filled +
            '&noscript=1',
            ''
          );
        }
        try {
          fbq('trackCustom', 'LeadFormAbandoned', {
            content_name: 'lead_form',
            fields_filled: filled,
            total_fields: inputs.length
          });
        } catch(e) {}
      }
    });
  }

  setupFormTracking();
})();
</script>

  <script>
    window.addEventListener('scroll', function() {
      var totalHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      ) - window.innerHeight;
      var scrollPercent = totalHeight > 0 ? (window.scrollY / totalHeight) * 100 : 0;
      if (scrollPercent >= 50 && !window._scroll50fired) {
        window._scroll50fired = true;
        if (typeof fbq === 'function') {
          fbq('trackCustom', 'ScrolledHalfway');
        }
      }
    });
  </script>
